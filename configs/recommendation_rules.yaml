global:
  default_stage: vegetative
  tds_to_ec_divisor: 500.0

healthy_default_message: Сенсорные параметры близки к допустимому диапазону. Поддерживай текущий режим и продолжай мониторинг.

stages:
  germination:
    air_temp_c:
      min: 24.0
      max: 28.0
      low_advice: Температура воздуха низкая для прорастания. Проверь подогрев и исключи холодные сквозняки.
      high_advice: Температура воздуха слишком высокая. Уменьши нагрев и усили воздухообмен.
    air_humidity_pct:
      min: 70.0
      max: 85.0
      low_advice: Влажность воздуха низкая. Добавь мягкое увлажнение или сократи интенсивность вентиляции.
      high_advice: Влажность воздуха слишком высокая. Усиль вентиляцию, чтобы снизить риск грибных проблем.
    solution_ph:
      min: 5.5
      max: 6.5
      low_advice: pH раствора ниже нормы. Добавляй корректирующий щёлочной компонент малыми шагами.
      high_advice: pH раствора выше нормы. Подкорректируй раствор кислотой и перепроверь калибровку pH-метра.
    ec_ms_cm:
      min: 1.2
      max: 1.8
      low_advice: Питательный раствор слишком слабый. Проверь дозировку удобрений.
      high_advice: Питательный раствор слишком концентрированный. Разбавь раствор и проверь накопление солей.
  seedling:
    air_temp_c:
      min: 22.0
      max: 26.0
      low_advice: Температура воздуха низкая для рассады. Подними температуру или сократи проветривание.
      high_advice: Температура воздуха высокая для рассады. Усиль вентиляцию и проверь перегрев от ламп.
    air_humidity_pct:
      min: 60.0
      max: 75.0
      low_advice: Влажность воздуха низкая. Рассада может испытывать стресс по транспирации.
      high_advice: Влажность воздуха высокая. Повышается риск плесени и вытягивания.
    solution_ph:
      min: 5.5
      max: 6.5
      low_advice: pH ниже рекомендуемого диапазона. Нормализуй раствор перед следующим поливом.
      high_advice: pH выше рекомендуемого диапазона. Проверь корректировку кислоты и исходную воду.
    ec_ms_cm:
      min: 1.5
      max: 2.2
      low_advice: EC низкая. Рассаде может не хватать питания.
      high_advice: EC высокая. Возможен солевой стресс. Разбавь раствор.
  vegetative:
    air_temp_c:
      min: 21.0
      max: 27.0
      low_advice: Температура воздуха ниже оптимума. Проверь обогрев, особенно ночью.
      high_advice: Температура воздуха выше оптимума. Усиль вентиляцию или затенение.
    air_humidity_pct:
      min: 60.0
      max: 70.0
      low_advice: Влажность низкая. Это может усиливать стресс и пересушивание листьев.
      high_advice: Влажность слишком высокая. Увеличивается риск грибных заболеваний.
    solution_ph:
      min: 5.5
      max: 6.5
      low_advice: pH ниже нормы. Проверь калибровку датчика и состав раствора.
      high_advice: pH выше нормы. Подкорректируй раствор кислотой и проверь щёлочность воды.
    ec_ms_cm:
      min: 1.5
      max: 3.0
      low_advice: EC низкая. Возможно недокорм в фазе активного роста.
      high_advice: EC высокая. Есть риск накопления солей. Проверь дренаж и концентрацию раствора.
  flowering:
    air_temp_c:
      min: 20.0
      max: 26.0
      low_advice: Температура занижена для цветения. Это может ухудшить завязь.
      high_advice: Температура завышена. Это может ухудшить опыление и завязываемость.
    air_humidity_pct:
      min: 60.0
      max: 70.0
      low_advice: Влажность низкая. Пыльца и рыльце могут пересыхать.
      high_advice: Влажность слишком высокая. Пыльца слипается, растёт риск болезней.
    solution_ph:
      min: 5.5
      max: 6.5
      low_advice: pH ниже нормы. Подкорректируй раствор.
      high_advice: pH выше нормы. Подкорректируй кислотностью и перепроверь показания.
    ec_ms_cm:
      min: 2.0
      max: 3.5
      low_advice: EC низкая для фазы цветения. Проверь питание по калию и кальцию.
      high_advice: EC слишком высокая. Есть риск осмотического стресса.
  fruiting:
    air_temp_c:
      min: 20.0
      max: 27.0
      low_advice: Температура воздуха низкая. Созревание и налив плодов могут замедлиться.
      high_advice: Температура воздуха высокая. Проверь перегрев, затенение и воздухообмен.
    air_humidity_pct:
      min: 60.0
      max: 70.0
      low_advice: Влажность воздуха низкая. Возможен водный стресс.
      high_advice: Влажность воздуха высокая. Растёт риск фитофтороза, плесени и растрескивания.
    solution_ph:
      min: 5.5
      max: 6.5
      low_advice: pH ниже нормы. Проверь корректность кислотной коррекции.
      high_advice: pH выше нормы. Может снижаться доступность питания.
    ec_ms_cm:
      min: 2.0
      max: 4.0
      low_advice: EC низкая для плодоношения. Плоды могут недополучать питание.
      high_advice: EC слишком высокая. Разбавь раствор и проверь, не растёт ли засоление.

disease_templates:
  healthy:
    - Визуально растение похоже на здоровое. Основная задача — удерживать стабильный микроклимат и не допускать резких скачков параметров.
  late_blight:
    - Симптомы похожи на фитофтороз. Снизь влажность листового аппарата, усили вентиляцию и изолируй сильно поражённые листья.
  leaf_mold:
    - Симптомы похожи на листовую плесень. Проверь вентиляцию, не допускай конденсата и снизь длительность высокой влажности.
  septoria_leaf_spot:
    - Симптомы похожи на септориоз. Удаляй сильно поражённые листья, избегай разбрызгивания воды по листу и улучшай циркуляцию воздуха.
  target_spot:
    - Симптомы похожи на target spot. Сократи время мокрой поверхности листа и убери растительные остатки.
  bacterial_spot:
    - Симптомы похожи на бактериальную пятнистость. Избегай разбрызгивания воды, дезинфицируй инструмент и изолируй поражённые растения.
  early_blight:
    - Симптомы похожи на early blight. Поддерживай ровный полив, снижай влажность листьев и удаляй заражённые листья.
  spider_mites_two_spotted_spider_mite:
    - Вероятно поражение паутинным клещом. Осмотри нижнюю сторону листа, не допускай перегрева и слишком сухого воздуха.
  tomato_yellow_leaf_curl_virus:
    - Вероятен вирус жёлтой курчавости листьев. Изолируй растение и проверь наличие белокрылки как возможного переносчика.
  tomato_mosaic_virus:
    - Вероятен вирус мозаики. Изолируй растение, соблюдай санитарный режим и не переноси сок растения инструментом.
  default_disease:
    - Обнаружены признаки неблагополучия. Проверь микроклимат, изолируй явно поражённые листья и сохрани снимок для ручной проверки агрономом.
